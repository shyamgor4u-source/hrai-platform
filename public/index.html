    if("serviceWorker" in navigator){
      window.addEventListener("load", function(){
        navigator.serviceWorker.register("/sw.js").catch(function(){});
      });
    }
    window.HRAI_API = (function(){
      var token = sessionStorage.getItem('hrai_token') || null;
      function getToken(){ return token; }
      function setToken(t){ token=t; if(t) sessionStorage.setItem('hrai_token',t); else sessionStorage.removeItem('hrai_token'); }
      async function api(path, options){
        options = options || {};
        var headers = Object.assign({'Content-Type':'application/json'}, options.headers||{});
        if(token) headers['Authorization'] = 'Bearer '+token;
        var res = await fetch(path, Object.assign({}, options, {headers:headers}));
        if(res.status===401){ token=null; sessionStorage.removeItem('hrai_token'); }
        return res;
      }
      return {getToken:getToken, setToken:setToken, api:api};
    })();
  </script>

// ── Radial ─────────────────────────────────────────────────────────────────────
function Radial({ value, size=100, stroke=8, color="#818cf8", label }) {
  const r=(size-stroke)/2, circ=2*Math.PI*r;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={circ*(1-value/100)} strokeLinecap="round"
            style={{transition:"stroke-dashoffset 1s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:size>110?20:14,fontWeight:700,color:"#f8fafc",fontFamily:"'DM Sans',sans-serif"}}>{value}%</span>
        </div>
      </div>
      {label&&<span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"#94a3b8",textAlign:"center"}}>{label}</span>}
    </div>
  );
}

function PulseSurvey({ pulseResponses, setPulseResponses, onBack }) {
  const [phase, setPhase]   = useState("land");
  const [details, setDetails] = useState({name:"",email:"",phone:"",linkedin:"",location:"",gender:"",salary:"",designation:"",industry:"",lookingForChange:""});
  const [errs, setErrs]     = useState({});
  const [step, setStep]     = useState(0);
  const [ans, setAns]       = useState({});
  const [copied, setCopied] = useState(false);
  const count = pulseResponses.length;
  const pct   = Math.min(100,Math.round((count/PULSE_GOAL)*100));
  const q     = PULSE_QUESTIONS[step];

  const PERSONAL_DOMAINS=["gmail.com","yahoo.com","hotmail.com","outlook.com","rediffmail.com","ymail.com","icloud.com","live.com","aol.com","protonmail.com","zoho.com","mail.com"];
  const validate = () => {
    const e={};
    if(!details.name.trim()) e.name=true;
    const em=details.email.trim().toLowerCase();
    const domain=em.split("@")[1]||"";
    if(!em.includes("@")||!domain) e.email=true;
    else if(PERSONAL_DOMAINS.includes(domain)) e.emailPersonal=true;
    if(!details.phone.trim()) e.phone=true;
    if(!details.location.trim()) e.location=true;
    if(!details.gender) e.gender=true;
    if(!details.salary) e.salary=true;
    if(!details.designation) e.designation=true;
    if(!details.industry) e.industry=true;
    if(!details.lookingForChange) e.lookingForChange=true;
    setErrs(e); return !Object.keys(e).length;
  };
  const submit = async () => {
    const newResponse={...details,answers:ans,submittedAt:new Date().toISOString()};
    const all=[...pulseResponses,newResponse];
    setPulseResponses(all);
    try{await window.HRAI_API.api('/api/pulse',{method:'POST',body:JSON.stringify(newResponse)});}catch(e){}

        }
        setEsiLoading(false);
      };

      const exportPDF=()=>{
        if(!esiAI)return;
        const sentCol=esiAI.overallSentiment==="positive"?"#16a34a":esiAI.overallSentiment==="needs attention"?"#dc2626":"#d97706";

const CERT_PAGES = 10;
const CERT_PER_PAGE = 10;
const LIKERT_CERT = ["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"];
const LIKERT_SCORE = {"Strongly Disagree":20,"Disagree":40,"Neutral":60,"Agree":80,"Strongly Agree":100};

function CertSurvey({ onBack, survey }) {
  const [phase, setPhase] = useState("intro");
  const [page, setPage]   = useState(1);
  const [ans, setAns]     = useState({});
  const [details, setDetails] = useState({name:"",email:"",designation:"",department:""});
  const [errs, setErrs]   = useState({});

  const pageQs = CERT_QUESTIONS.filter(q => q.page === page);
  const totalAnswered = Object.keys(ans).length;
  const totalQ = CERT_QUESTIONS.length;
  const progress = Math.round((totalAnswered / totalQ) * 100);
  const pageComplete = pageQs.every(q => ans[q.id]);

  const validate = () => {
    const e = {};
    if (!details.name.trim()) e.name = true;
    if (!details.email.includes("@")) e.email = true;
    if (!details.designation.trim()) e.designation = true;
    if (!details.department.trim()) e.department = true;
    setErrs(e); return !Object.keys(e).length;
  };

  const pillarScores = () => {
    const pillars = {};
    CERT_QUESTIONS.forEach(q => {
      if (!pillars[q.pillar]) pillars[q.pillar] = [];
      if (ans[q.id]) pillars[q.pillar].push(LIKERT_SCORE[ans[q.id]] || 60);
    });
    return Object.entries(pillars).map(([k, vs]) => ({
      pillar: k,
      score: Math.round(vs.reduce((a,b)=>a+b,0)/Math.max(1,vs.length)),
      color: CERT_PILLAR_COLORS[k] || "#818cf8"
    }));
  };

  const overallScore = () => {
    const scores = CERT_QUESTIONS.map(q => LIKERT_SCORE[ans[q.id]] || 0).filter(Boolean);
    return scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  };

  const certLevel = (score) => {
    if (score >= 85) return { label:"HRAI Platinum Certified", color:"#e5e7eb", badge:"🏆" };
    if (score >= 75) return { label:"HRAI Gold Certified",     color:"#fcd34d", badge:"🥇" };

const FOCUSED_LIKERT = ["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"];

// CAMPAIGN SURVEY FLOW (CARE / CLARITY — no big profile form)
// ─────────────────────────────────────────────────────────
const CARE_Q_PER_PAGE=5;
function CampaignSurveyFlow({campaignId,track,org,onBack,onComplete}){
  const [phase,setPhase]=useState("intro");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [emailErr,setEmailErr]=useState("");
  const [page,setPage]=useState(1);
  const [ans,setAns]=useState({});
  const [personalMetrics,setPersonalMetrics]=useState({});
  const questions=SURVEY_QUESTIONS[track]||SURVEY_QUESTIONS[ConversationTrack.CARE];
  const totalPages=Math.ceil(questions.length/CARE_Q_PER_PAGE);
  const pageQs=questions.slice((page-1)*CARE_Q_PER_PAGE,page*CARE_Q_PER_PAGE);
  const pageComplete=pageQs.every(q=>ans[q.id]);
  const trackLabel=track===ConversationTrack.CLARITY?"C.L.A.R.I.T.Y. (ALIGN)":"C.A.R.E. (OPEN)";
  const trackColor=track===ConversationTrack.CLARITY?"#fcd34d":"#34d399";

  const handleBegin=()=>{
    const em=email.trim().toLowerCase();
    if(!name.trim()){setEmailErr("Please enter your name.");return;}
    if(!em.includes("@")){setEmailErr("Please enter a valid email address.");return;}
    setEmailErr("");setPhase("survey");
  };

  const submit=async()=>{
    // Build aggregated metrics from answers
    const catScores={};const catCounts={};
    const scaleMap={1:20,2:40,3:60,4:80,5:100};
    const yesNoMap={"Yes":100,"No":20};
    const mcScore=50;
    questions.forEach(q=>{
      const a=ans[q.id];if(!a)return;
      let sc=0;
      if(q.type==="SCALE")sc=typeof a==="number"?a*20:parseInt(a)*20||60;
      else if(q.type==="YES_NO")sc=yesNoMap[a]||60;
      else if(q.type==="MULTIPLE_CHOICE")sc=mcScore;
      else sc=70;
      if(!catScores[q.category])catScores[q.category]=0,catCounts[q.category]=0;
      catScores[q.category]+=sc;catCounts[q.category]++;
    });
    const metrics={};Object.keys(catScores).forEach(k=>{metrics[k]=Math.round(catScores[k]/catCounts[k]);});

    const response={name:name.trim(),email:email.trim().toLowerCase(),answers:ans,submittedAt:new Date().toISOString(),metrics};
    try{
      await window.HRAI_API.api(`/api/campaigns/${campaignId}/responses`,{method:'POST',body:JSON.stringify(response)});
    }catch(e){}
    setPersonalMetrics(metrics);
    setPhase("done");
  };

  if(phase==="intro")return(
    <div className="pub fade"><style>{CSS}</style>
      <div style={{maxWidth:560,margin:"0 auto",padding:"60px 20px",textAlign:"center"}}>
        <div style={{width:48,height:48,background:`linear-gradient(135deg,${trackColor}30,${trackColor}10)`,border:`1px solid ${trackColor}40`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 20px"}}>📋</div>
        <div className="badge" style={{background:`${trackColor}15`,color:trackColor,border:`1px solid ${trackColor}30`,marginBottom:16,fontSize:11}}>{trackLabel} Survey</div>
        <h1 style={{fontSize:28,fontWeight:800,color:"#f8fafc",letterSpacing:"-0.02em",marginBottom:8}}>{org?`${org} — `:""}Culture Survey</h1>
        <p style={{fontSize:14,color:"#64748b",lineHeight:1.8,maxWidth:440,margin:"0 auto 32px"}}>You've been invited to share your honest feedback. This survey is confidential — your individual responses are never shared with anyone.</p>
        <div style={{background:"rgba(12,19,34,0.8)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"24px 28px",marginBottom:28,textAlign:"left"}}>
          <p style={{fontSize:12,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>Before we begin — just two quick details:</p>

                    {q.type==="YES_NO"&&(

  if(phase==="done"){
    const overallScore=Object.keys(personalMetrics).length>0?Math.round(Object.values(personalMetrics).reduce((a,b)=>a+b,0)/Object.values(personalMetrics).length):0;

                    <div className="pt" style={{height:6}}><div className="pf" style={{width:`${v}%`,background:v>=70?color:v>=50?"#fbbf24":"#f87171"}}/></div>

            </button>

// ── Track display helper ───────────────────────────────────────────────────────
function trackLabel(track){
  if(track===ConversationTrack.CARE)return"C.A.R.E.";
  if(track===ConversationTrack.CLARITY)return"C.L.A.R.I.T.Y.";
  if(track===ConversationTrack.CERT)return"🏆 Certification";
  const fs=FOCUSED_SURVEY_LIST.find(s=>s.id===track);
  if(fs)return fs.icon+" "+fs.label;
  return track;
}
function trackBadgeClass(track){
  if(track===ConversationTrack.CARE)return"tag-care";
  if(track===ConversationTrack.CLARITY)return"tag-clarity";
  if(track===ConversationTrack.CERT)return"badge-super";
  return"badge-client";
}

function ClientPortal({ user, surveys, onLogout, onTakeSurvey, refreshSurveys }) {
  // Refresh surveys from API on mount so results are always fresh
  useEffect(()=>{ refreshSurveys?.(); },[]);

  // Match campaigns where this user's email is a participant OR has report access
  const userEmail=(user.email||"").toLowerCase().trim();
  const mySurveys=surveys.filter(s=>{
    const inParticipants=(s.participants||[]).some(p=>(p.email||"").toLowerCase().trim()===userEmail);
    const inReportAccess=(s.reportAccessEmails||[]).some(e=>(e||"").toLowerCase().trim()===userEmail);
    return inParticipants||inReportAccess;
  });
  const [sel,setSel]=useState(mySurveys[0]?.id||null);
  const [takingSurvey,setTakingSurvey]=useState(false);
  const survey=mySurveys.find(s=>s.id===sel);
  const pct=survey?Math.min(100,Math.round((survey.responses/Math.max(1,survey.participants.length))*100)):0;
  const canDownload=survey?.reportAccessEmails?.some(e=>(e||"").toLowerCase().trim()===userEmail);
  const myParticipantStatus=survey?(survey.participants||[]).find(p=>(p.email||"").toLowerCase().trim()===userEmail)?.status:"";
  const alreadyCompleted=myParticipantStatus==="Completed";

  // Compute overall avg score for display
  const avgScore=survey&&Object.keys(survey.aggregatedMetrics||{}).length>0
    ?Math.round(Object.values(survey.aggregatedMetrics).reduce((a,b)=>a+b,0)/Object.values(survey.aggregatedMetrics).length)
    :null;
  const scoreColor=avgScore>=70?"#34d399":avgScore>=50?"#fbbf24":"#f87171";

function App() {

  const [view,setView]=useState("dashboard");

  const [newAccessEmail,setNewAccessEmail]=useState("");
  const [newAdminForm,setNewAdminForm]=useState({name:"",email:"",password:""});
  const [adminList,setAdminList]=useState([]);
  const [showNewCampaign,setShowNewCampaign]=useState(false);
  const [newCamp,setNewCamp]=useState({clientName:"",clientIndustry:"",campaignTitle:"",track:ConversationTrack.CARE,emails:""});
  const [campaignLink,setCampaignLink]=useState(null);
  const [linkCopied,setLinkCopied]=useState(false);
  const [pdfModal,setPdfModal]=useState(null);
  const [pdfInsight,setPdfInsight]=useState(null);
  const [pdfLoading,setPdfLoading]=useState(false);
  const [showPendingUsers,setShowPendingUsers]=useState(false);
  const [showAdminRights,setShowAdminRights]=useState(false);
  const [showOptionsMenu,setShowOptionsMenu]=useState(false);
  const [showDataInfo,setShowDataInfo]=useState(false);
  const [showExportMenu,setShowExportMenu]=useState(false);
  const [esiReport,setEsiReport]=useState(null);
  const [esiReportLoading,setEsiReportLoading]=useState(false);
  const [adminRightsForm,setAdminRightsForm]=useState({name:"",email:"",password:""});
  const [adminRightsPerms,setAdminRightsPerms]=useState({dashboard:true,campaigns:true,insights:true,certification:false});
  const [editingAdmin,setEditingAdmin]=useState(null);

  // Auto-login check on page load
  useEffect(()=>{
    if(window.HRAI_API.getToken()){
      (async()=>{
        try{
          const res=await window.HRAI_API.api('/api/auth/me');
          if(res.ok){const data=await res.json();setCurrentUser(data.user||data);}
          else{window.HRAI_API.setToken(null);}
        }catch(e){window.HRAI_API.setToken(null);}
      })();
    }
  },[]);

  useEffect(()=>{if(currentUser&&(view==="insights"||view==="dashboard"))refreshCampaignData();},[view,currentUser]);

  // Auto-poll every 5s when on insights view so new responses appear automatically
  useEffect(()=>{
    if(view!=="insights")return;
    const t=setInterval(()=>refreshCampaignData(),5000);
    return()=>clearInterval(t);
  },[view]);

  // Auto-select most recent campaign when entering insights and nothing is selected
  useEffect(()=>{
    if(view==="insights"&&!selId&&surveys.length>0){
      setSelId(surveys[0].id);
    }
  },[view,surveys,selId]);

  // Load data from API when user logs in
  useEffect(()=>{
    if(!currentUser)return;
    (async()=>{
      try{const res=await window.HRAI_API.api('/api/campaigns');if(res.ok){const data=await res.json();setSurveys(data.campaigns||data);const map={};(data.campaigns||data).forEach(c=>{if(c.responsesData)map[c.id]=c.responsesData;});setCampaignResponsesMap(map);}}catch(e){}
      try{const res=await window.HRAI_API.api('/api/pulse');if(res.ok){const data=await res.json();setPulseResponses(Array.isArray(data)?data:data.responses||[]);}}catch(e){}
      if(currentUser.role==="superadmin"||currentUser.role==="admin"){
        try{const res=await window.HRAI_API.api('/api/users/admins');if(res.ok){const data=await res.json();setAdminList(Array.isArray(data)?data:data.admins||[]);}}catch(e){}
        try{const res=await window.HRAI_API.api('/api/users');if(res.ok){const data=await res.json();setRegisteredUsers(Array.isArray(data)?data:data.users||[]);}}catch(e){}
      }
    })();
  },[currentUser]);

  useEffect(()=>{
    (async()=>{try{const res=await window.HRAI_API.api('/api/pulse');if(res.ok){const data=await res.json();setPulseResponses(Array.isArray(data)?data:data.responses||[]);}}catch(e){}})();
    // Auto-route from URL params (shared survey links)
    const params=new URLSearchParams(window.location.search);
    const campId=params.get("campaign");
    const track=params.get("track");
    const surveyType=params.get("survey");
    if(surveyType==="esi"||campId===null&&window.location.search.includes("esi")){
      setShowPulse(true);
    } else if(campId){
      const fsId=FOCUSED_SURVEY_LIST.find(s=>s.id===campId||s.id===track);
      if(fsId){setFocusedSurveyId(fsId.id);setFocusedCampaignId(campId);}
      else if(track===ConversationTrack.CERT){setShowCert(true);}
      else if(track===ConversationTrack.CARE||track===ConversationTrack.CLARITY){
        setActiveCampaignSurvey({id:campId,track,org:params.get("org")||""});
      }
      else{setShowPulse(true);}
    }
  },[]);

  useEffect(()=>{if(!showExportMenu)return;const h=()=>setShowExportMenu(false);document.addEventListener("click",h);return()=>document.removeEventListener("click",h);},[showExportMenu]);

  const selSurvey=useMemo(()=>surveys.find(s=>s.id===selId),[surveys,selId]);
  const emailCount=useMemo(()=>camp.emails.split(/[\n,]+/).map(e=>e.trim()).filter(e=>e.includes("@")).length,[camp.emails]);
  const pulsePct=Math.min(100,Math.round((pulseResponses.length/PULSE_GOAL)*100));
  const isSuperAdmin=currentUser?.role==="superadmin";

  // Pulse virtual survey object for analytics
  const pulseSurveyObj = {
    id:"__pulse__", title:"HRAI ESI — Public Survey",
    companyId:"pulse", track:"PUBLIC",
    participants: pulseResponses.map(r=>({email:r.email,status:"Completed"})),
    createdAt:"2025-01-01", responses:pulseResponses.length,
    aggregatedMetrics:(()=>{
      const lm={"Strongly Disagree":20,"Disagree":40,"Neutral":60,"Agree":80,"Strongly Agree":100};
      const ls=(ids)=>Math.round(ids.map(id=>{const vs=pulseResponses.map(r=>lm[r.answers?.[id]]).filter(Boolean);return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:65;}).reduce((a,b)=>a+b,0)/ids.length);
      return{
        "value & recognition":ls(["p1","p2","p3"])||72,
        "role clarity":ls(["p4","p5","p6"])||68,
        "visibility & voice":ls(["p7","p8","p9"])||65,
        "growth & career":ls(["p10","p11","p12"])||70,
        "reward & fairness":ls(["p13","p14"])||62,
        "manager & team":ls(["p15","p16"])||75,
        "culture & well-being":ls(["p17","p18"])||69,
        "engagement & retention":ls(["p19","p20"])||71,
      };
    })(),
    reportAccessEmails:[],
  };

  const effectiveSelSurvey = selId==="__pulse__" ? pulseSurveyObj : selSurvey;

  const handleLogin=async()=>{
    setLoginError("");
    const em=loginForm.email.trim().toLowerCase();
    const pw=loginForm.password;
    try{
      const res=await window.HRAI_API.api('/api/auth/login',{method:'POST',body:JSON.stringify({email:em,password:pw})});
      const data=await res.json();
      if(!res.ok){setLoginError(data.error||"Incorrect email or password. Please try again.");return;}
      window.HRAI_API.setToken(data.token);
      setCurrentUser(data.user);
    }catch(e){setLoginError("Incorrect email or password. Please try again.");}
  };

  const PERSONAL_EMAIL_DOMAINS=["gmail.com","yahoo.com","hotmail.com","outlook.com","rediffmail.com","ymail.com","icloud.com","live.com","aol.com","protonmail.com"];
  const handleRegister=async()=>{
    setRegError("");
    const em=regForm.email.trim().toLowerCase();
    const domain=em.split("@")[1]||"";
    const phone=regForm.phone.trim();
    // Name
    if(!regForm.name.trim()){setRegError("Full name is required.");return;}
    // Email
    if(!em.includes("@")||!domain){setRegError("Enter a valid email address.");return;}
    if(PERSONAL_EMAIL_DOMAINS.includes(domain)){setRegError("Only official/work email addresses are accepted. Gmail, Yahoo, Hotmail etc. are not allowed.");return;}
    // Phone — 10 digits, numbers only
    if(!phone){setRegError("Mobile number is required.");return;}
    if(!/^[0-9]{10}$/.test(phone)){setRegError("Mobile number must be exactly 10 digits with no spaces, letters or special characters.");return;}
    // Password
    if(regForm.password.length<8){setRegError("Password must be at least 8 characters.");return;}
    if(regForm.password!==regForm.confirm){setRegError("Passwords do not match.");return;}
    try{
      const res=await window.HRAI_API.api('/api/auth/register',{method:'POST',body:JSON.stringify({name:regForm.name.trim(),email:em,phone,password:regForm.password})});
      const data=await res.json();
      if(!res.ok){setRegError(data.error||"Registration failed.");return;}
      setPendingUser(data.user);
      setShowRegister(false);
      setRegForm({name:"",email:"",phone:"",password:"",confirm:""});
      setRegError("");
    }catch(e){setRegError("Registration failed. Please try again.");}
  };

  const createCampaign=async()=>{
    const emails=camp.emails.split(/[\n,]+/).map(e=>e.trim()).filter(e=>e.includes("@"));
    const s={title:camp.title,companyId:camp.companyId,track:camp.track,participants:emails.map(e=>({email:e,status:"Pending"})),createdAt:new Date().toISOString().split("T")[0],responses:0,active:true,aggregatedMetrics:{ownership:0,accountability:0,trust:0,communication:0,culture:0,inclusion:0},reportAccessEmails:[]};
    try{const res=await window.HRAI_API.api('/api/campaigns',{method:'POST',body:JSON.stringify(s)});if(res.ok){const data=await res.json();setSurveys([data.campaign||data,...surveys]);}}catch(e){}
    setView("dashboard");setCamp({title:"",companyId:"2",track:ConversationTrack.CARE,emails:""});
  };

  const createNewCampaignFlow=async()=>{
    const emails=newCamp.emails.split(/[\n,]+/).map(e=>e.trim()).filter(e=>e.includes("@"));

  const LM={"Strongly Disagree":20,"Disagree":40,"Neutral":60,"Agree":80,"Strongly Agree":100};

  const computeEsiDemographics=()=>{
    const groupBy=(arr,keyFn)=>{
      const map={};
      arr.forEach(r=>{const k=keyFn(r)||"Unknown";if(!map[k])map[k]=[];map[k].push(r);});
      return Object.entries(map).map(([label,resps])=>{
        const pillarScores={};
        Object.entries(PILLAR_MAP).forEach(([pillar,qids])=>{
          const vals=resps.flatMap(r=>qids.map(qid=>LM[r.answers?.[qid]]).filter(Boolean));
          pillarScores[pillar]=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
        });
        const allVals=Object.values(pillarScores).filter(Boolean);
        const avgScore=allVals.length?Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length):0;
        const activeChange=resps.filter(r=>r.lookingForChange==="Yes, actively").length;
        return{label,count:resps.length,avgScore,changeRate:Math.round((activeChange/resps.length)*100),pillars:pillarScores};
      }).sort((a,b)=>b.count-a.count);
    };
    return{
      byDesignation:groupBy(pulseResponses,r=>r.designation),
      byIndustry:groupBy(pulseResponses,r=>r.industry),
      byGender:groupBy(pulseResponses,r=>r.gender),
      bySalary:groupBy(pulseResponses,r=>r.salary),
      byLocation:groupBy(pulseResponses,r=>(r.location||"")
        .split(",")[0].trim()||"Unknown"),
      byChangeIntent:groupBy(pulseResponses,r=>r.lookingForChange),
    };
  };

            const updated=allUsers.map(u=>u.id===id?{...u,verified:true}:u);
            setRegisteredUsers(updated);
            const u=allUsers.find(x=>x.id===id);

              const sub=encodeURIComponent("Your HRAI Account Has Been Approved – You Can Now Log In");

                        {(effectiveSelSurvey.reportAccessEmails||[]).length===0
                          ?<p style={{fontSize:11,color:"#475569"}}>No access granted yet.</p>
                          :<div style={{display:"flex",flexDirection:"column",gap:5}}>{(effectiveSelSurvey.reportAccessEmails||[]).map(em=><div key={em} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#94a3b8",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><Ic.Check/>{em}</div>)}</div>
                        }
                      </div>
                    )}
                    {selId&&selId!=="__pulse__"&&(()=>{
                      const campR=campaignResponsesMap[selId]||[];
                      if(campR.length===0)return(
                        <div className="card">
                          <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",color:"#64748b",marginBottom:10}}>Who Filled</p>
                          <p style={{fontSize:11,color:"#475569"}}>No responses yet.</p>
                        </div>
                      );
                      return(
                        <div className="card">
                          <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",color:"#64748b",marginBottom:12}}>Who Filled ({campR.length})</p>
                          <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:260,overflowY:"auto"}}>
                            {campR.map((r,i)=>(
                              <div key={i} style={{padding:"8px 10px",background:"rgba(52,211,153,0.05)",border:"1px solid rgba(52,211,153,0.15)",borderRadius:8}}>
                                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                                  <div style={{width:22,height:22,borderRadius:"50%",background:"linear-gradient(135deg,#059669,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"white",flexShrink:0}}>{r.name?.[0]?.toUpperCase()||"?"}</div>
                                  <div>
                                    <p style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>{r.name||"Anonymous"}</p>
                                    <p style={{fontSize:10,color:"#64748b"}}>{r.email}</p>
                                  </div>
                                </div>
                                <p style={{fontSize:9,color:"#475569",marginLeft:29}}>{r.submittedAt?new Date(r.submittedAt).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—"}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                </div>
                {/* ── ESI Intelligence Report (pulse only) ── */}
                {selId==="__pulse__"&&(
                  <div className="card" style={{marginTop:16,position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#0d9488,#7c3aed,#f59e0b)"}}/>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          <h4 style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>ESI Intelligence Report</h4>
                          <span className="badge" style={{fontSize:8,background:"rgba(124,58,237,0.12)",border:"1px solid rgba(124,58,237,0.3)",color:"#a78bfa"}}>Dynamic · Demographic Analysis</span>
                        </div>
                        <p style={{fontSize:11,color:"#475569"}}>Cross-tabulate sentiment by City, Gender, Designation, Industry, Salary &amp; Job-Change Intent</p>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        {esiReport&&<button className="btn btg btsm" onClick={downloadEsiReportPDF} style={{fontSize:10}}>📄 Download PDF</button>}
                        <button className="btn btsm" disabled={esiReportLoading||pulseResponses.length<3} onClick={generateEsiReport} style={{background:"linear-gradient(135deg,#7c3aed,#0d9488)",color:"white",border:"none",fontSize:10,opacity:esiReportLoading?0.7:1}}>
                          <Ic.Star/>{esiReportLoading?"Generating deep analysis…":"Generate Intelligence Report"}
                        </button>
                      </div>
                    </div>
                    {pulseResponses.length<3&&<p style={{color:"#475569",fontSize:12,textAlign:"center",padding:"16px 0"}}>Minimum 3 ESI responses required to generate the intelligence report.</p>}
                    {esiReportLoading&&<div style={{display:"flex",gap:7,padding:"24px 0",justifyContent:"center"}}>{[0,0.2,0.4].map((d,i)=><span key={i} className="ldot" style={{animationDelay:`${d}s`}}/>)}</div>}
                    {!esiReportLoading&&esiReport&&(
                      <div>
                        {/* Headline */}
                        {esiReport.headline&&<p style={{fontSize:18,fontWeight:800,color:esiReport.overallSentiment==="positive"?"#34d399":esiReport.overallSentiment==="needs attention"?"#f87171":"#fbbf24",marginBottom:12,lineHeight:1.4}}>{esiReport.headline}</p>}
                        {/* Sentiment badge */}
                        {esiReport.overallSentiment&&<span className="badge" style={{marginBottom:14,display:"inline-flex",fontSize:9,background:esiReport.overallSentiment==="positive"?"rgba(52,211,153,0.12)":esiReport.overallSentiment==="needs attention"?"rgba(248,113,113,0.12)":"rgba(251,191,36,0.12)",border:`1px solid ${esiReport.overallSentiment==="positive"?"rgba(52,211,153,0.3)":esiReport.overallSentiment==="needs attention"?"rgba(248,113,113,0.3)":"rgba(251,191,36,0.3)"}`,color:esiReport.overallSentiment==="positive"?"#34d399":esiReport.overallSentiment==="needs attention"?"#f87171":"#fbbf24"}}>{esiReport.overallSentiment==="positive"?"🟢":esiReport.overallSentiment==="needs attention"?"🔴":"🟡"} {esiReport.overallSentiment}</span>}
                        {/* Executive Summary */}
                        <p style={{color:"#94a3b8",lineHeight:1.8,fontSize:13,marginBottom:20}}>{esiReport.executiveSummary}</p>
                        {/* Key Findings */}
                        {esiReport.keyFindings?.length>0&&(
                          <div style={{marginBottom:20}}>
                            <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#64748b",marginBottom:10}}>Key Findings</p>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                              {esiReport.keyFindings.map((f,i)=>{
                                const sColor=f.severity==="high"?"#f87171":f.severity==="medium"?"#fbbf24":"#34d399";
                                const sBg=f.severity==="high"?"rgba(248,113,113,0.06)":f.severity==="medium"?"rgba(251,191,36,0.06)":"rgba(52,211,153,0.06)";
                                return(
                                  <div key={i} style={{padding:"12px 14px",background:sBg,border:`1px solid ${sColor}25`,borderRadius:10}}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6,marginBottom:6}}>
                                      <p style={{fontSize:11,fontWeight:700,color:"#e2e8f0",lineHeight:1.4}}>{f.title}</p>
                                      <span style={{fontSize:8,fontWeight:700,color:sColor,textTransform:"uppercase",flexShrink:0,padding:"2px 6px",borderRadius:4,background:`${sColor}18`}}>{f.severity}</span>
                                    </div>
                                    <p style={{fontSize:11,color:"#94a3b8",lineHeight:1.6}}>{f.insight}</p>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                        {/* At-Risk Segments */}
                        {esiReport.atRiskSegments?.length>0&&(
                          <div style={{marginBottom:20}}>
                            <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#f87171",marginBottom:10}}>⚠ At-Risk Segments</p>
                            <div style={{display:"flex",flexDirection:"column",gap:8}}>
                              {esiReport.atRiskSegments.map((s,i)=>(
                                <div key={i} style={{padding:"12px 16px",background:"rgba(248,113,113,0.04)",border:"1px solid rgba(248,113,113,0.15)",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                                  <div style={{flex:1,minWidth:200}}>
                                    <p style={{fontSize:12,fontWeight:700,color:"#fca5a5",marginBottom:3}}>{s.segment}</p>
                                    <p style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{s.concern}</p>
                                  </div>
                                  <div style={{display:"flex",gap:16,flexShrink:0}}>
                                    <div style={{textAlign:"center"}}><p style={{fontSize:18,fontWeight:800,color:"#f87171"}}>{s.score}</p><p style={{fontSize:8,color:"#475569",textTransform:"uppercase"}}>Score</p></div>
                                    <div style={{textAlign:"center"}}><p style={{fontSize:18,fontWeight:800,color:"#fb923c"}}>{s.changeRate}%</p><p style={{fontSize:8,color:"#475569",textTransform:"uppercase"}}>Seeking Change</p></div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                        {/* Strong Segments */}
                        {esiReport.strongSegments?.length>0&&(
                          <div style={{marginBottom:20}}>
                            <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#34d399",marginBottom:10}}>✅ Strong Segments</p>
                            <div style={{display:"flex",flexDirection:"column",gap:8}}>
                              {esiReport.strongSegments.map((s,i)=>(
                                <div key={i} style={{padding:"12px 16px",background:"rgba(52,211,153,0.04)",border:"1px solid rgba(52,211,153,0.15)",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                                  <div style={{flex:1,minWidth:200}}>
                                    <p style={{fontSize:12,fontWeight:700,color:"#6ee7b7",marginBottom:3}}>{s.segment}</p>
                                    <p style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{s.insight}</p>
                                  </div>
                                  <div style={{textAlign:"center",flexShrink:0}}><p style={{fontSize:18,fontWeight:800,color:"#34d399"}}>{s.score}</p><p style={{fontSize:8,color:"#475569",textTransform:"uppercase"}}>Score</p></div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                        {/* Pillar-by-Demographic Analysis */}
                        {esiReport.pillarAnalysis?.length>0&&(
                          <div style={{marginBottom:20}}>
                            <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#64748b",marginBottom:10}}>Pillar-by-Demographic Analysis</p>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                              {esiReport.pillarAnalysis.map((p,i)=>{
                                const pc2=PILLAR_COLORS[p.pillar.toLowerCase()]||"#818cf8";
                                return(
                                  <div key={i} style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,borderLeft:`3px solid ${pc2}`}}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                                      <p style={{fontSize:11,fontWeight:700,color:"#e2e8f0",textTransform:"capitalize"}}>{p.pillar}</p>
                                      <span style={{fontSize:12,fontWeight:800,color:pc2}}>{p.score}%</span>
                                    </div>
                                    <p style={{fontSize:10,color:"#94a3b8",lineHeight:1.6}}>{p.demographicInsight}</p>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                        {/* Recommendations */}
                        {esiReport.recommendations?.length>0&&(
                          <div>
                            <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#64748b",marginBottom:10}}>Strategic Recommendations</p>
                            <div style={{display:"flex",flexDirection:"column",gap:6}}>
                              {esiReport.recommendations.map((r,i)=>(
                                <div key={i} style={{display:"flex",gap:9,alignItems:"flex-start",padding:"10px 12px",background:"rgba(124,58,237,0.04)",borderRadius:8,border:"1px solid rgba(124,58,237,0.12)"}}>
                                  <span style={{color:"#7c3aed",fontWeight:700,fontSize:11,flexShrink:0,fontFamily:"'DM Mono',monospace"}}>{String(i+1).padStart(2,"0")}</span>
                                  <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.65}}>{r}</p>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                    {!esiReportLoading&&!esiReport&&pulseResponses.length>=3&&<p style={{color:"#334155",textAlign:"center",padding:"24px 0",fontSize:13}}>Generate a deep-dive intelligence report cross-referencing demographics with ESI pillar scores.</p>}
                  </div>
                )}
                </>
              ):(
                <div>
                  {surveys.length===0?(
                    <div style={{textAlign:"center",padding:"60px 20px",background:"#0f1825",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)"}}>
                      <div style={{fontSize:40,marginBottom:12}}>📭</div>
                      <p style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:8}}>No campaigns yet</p>
                      <p style={{fontSize:12,color:"#475569"}}>Create a campaign from the Campaigns tab to see analytics here.</p>
                    </div>
                  ):(
                    <div>
                      <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Select a campaign from the dropdown above, or click one below:</p>
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {surveys.map(s=>{
                          const campR=campaignResponsesMap[s.id]||[];
                          const comp=MOCK_COMPANIES.find(c=>c.id===s.companyId);
                          return(
                            <div key={s.id} onClick={()=>{setSelId(s.id);setAiInsight(null);}}
                              style={{padding:"18px 20px",background:"rgba(124,58,237,0.07)",border:"1px solid rgba(124,58,237,0.2)",borderRadius:12,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                              <div>
                                <p style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{s.title}</p>
                                <p style={{fontSize:11,color:"#64748b"}}>{s.track===ConversationTrack.CARE?"C.A.R.E.":"C.L.A.R.I.T.Y."} · Created {s.createdAt}</p>
                              </div>
                              <div style={{textAlign:"right",flexShrink:0}}>
                                <p style={{fontSize:22,fontWeight:800,color:s.responses>0?"#34d399":"#334155"}}>{s.responses}</p>
                                <p style={{fontSize:10,color:"#475569"}}>responses</p>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {view==="certification"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,flexWrap:"wrap",gap:12}}>
                <div>
                  <h3 style={{fontSize:20,fontWeight:800,color:"#f8fafc",marginBottom:3,letterSpacing:"-0.02em"}}>🏆 HRAI Certification</h3>
                  <p style={{color:"#64748b",fontSize:12}}>Certify your organisation as a great place to work</p>
                </div>
              </div>
              {/* Certification info cards */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16,marginBottom:20}}>
                <div className="card" style={{background:"linear-gradient(135deg,rgba(245,158,11,0.08),rgba(124,58,237,0.05))",border:"1px solid rgba(245,158,11,0.2)"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🏆</div>
                  <h4 style={{fontSize:16,fontWeight:700,color:"#fbbf24",marginBottom:8}}>HRAI Platinum</h4>
                  <p style={{fontSize:12,color:"#64748b",lineHeight:1.7}}>Score 85+ across all 10 dimensions. Industry benchmark for exceptional workplaces in India.</p>
                  <p style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginTop:12}}>Score: 85–100</p>
                </div>
                <div className="card" style={{background:"linear-gradient(135deg,rgba(252,211,77,0.06),transparent)",border:"1px solid rgba(252,211,77,0.15)"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🥇</div>
                  <h4 style={{fontSize:16,fontWeight:700,color:"#fcd34d",marginBottom:8}}>HRAI Gold</h4>
                  <p style={{fontSize:12,color:"#64748b",lineHeight:1.7}}>Score 75–84. High-performing workplaces with strong culture and employee experience.</p>
                  <p style={{fontSize:11,fontWeight:700,color:"#fcd34d",marginTop:12}}>Score: 75–84</p>
                </div>
                <div className="card" style={{background:"linear-gradient(135deg,rgba(203,213,225,0.05),transparent)",border:"1px solid rgba(203,213,225,0.12)"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🥈</div>
                  <h4 style={{fontSize:16,fontWeight:700,color:"#cbd5e1",marginBottom:8}}>HRAI Silver</h4>
                  <p style={{fontSize:12,color:"#64748b",lineHeight:1.7}}>Score 65–74. Strong employer with positive culture, advancing towards excellence.</p>
                  <p style={{fontSize:11,fontWeight:700,color:"#cbd5e1",marginTop:12}}>Score: 65–74</p>
                </div>
                <div className="card" style={{background:"linear-gradient(135deg,rgba(217,119,6,0.06),transparent)",border:"1px solid rgba(217,119,6,0.12)"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🥉</div>
                  <h4 style={{fontSize:16,fontWeight:700,color:"#d97706",marginBottom:8}}>HRAI Bronze</h4>
                  <p style={{fontSize:12,color:"#64748b",lineHeight:1.7}}>Score 55–64. Developing culture with clear commitment to improvement.</p>
                  <p style={{fontSize:11,fontWeight:700,color:"#d97706",marginTop:12}}>Score: 55–64</p>
                </div>
              </div>
              {/* 10 dimensions */}
              <div className="card" style={{marginBottom:20}}>
                <p style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"#64748b",marginBottom:16}}>10 Certification Dimensions · 10 Questions Each</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
                  {Object.entries(CERT_PILLAR_COLORS).map(([pillar,color])=>(
                    <div key={pillar} style={{padding:"12px",background:`${color}0d`,border:`1px solid ${color}22`,borderRadius:8,textAlign:"center"}}>
                      <p style={{fontSize:11,fontWeight:700,color,lineHeight:1.4}}>{pillar}</p>
                      <p style={{fontSize:9,color:"#475569",marginTop:4}}>10 Qs</p>
                    </div>
                  ))}
                </div>
              </div>
              {/* Launch button */}
              <div className="card" style={{textAlign:"center",padding:"32px"}}>
                <p style={{fontSize:15,fontWeight:700,color:"#e2e8f0",marginBottom:8}}>Launch Certification Survey</p>
                <p style={{fontSize:13,color:"#475569",marginBottom:24,lineHeight:1.7}}>Run the HRAI Certification survey across your organisation. Results are analysed across 10 dimensions to determine your certification tier.</p>
                <button className="btn btpl" style={{padding:"13px 32px",fontSize:13}} onClick={()=>setShowCert(true)}>
                  🏆 Preview Certification Survey
                </button>
                <p style={{fontSize:11,color:"#334155",marginTop:12}}>To run a full certification for a company, create a new campaign and select "HRAI Certification" as the framework.</p>
              </div>
            </div>
          )}

        </div>
      </main>
    </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
